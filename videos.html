<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>الفيديوهات التعليمية - منصة مُعلمي</title>
    <link rel="stylesheet" href="vedios.css">
    
    <style>
        /* 🚫 منع التحميل عبر الـ CSS وحماية وسم الفيديو */
        video {
            /* منع ظهور قائمة التحميل في متصفحات المبنية على Chromium */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        /* إخفاء زر التحميل نهائياً من المتصفحات */
        video::-internal-media-controls-download-button {
            display:none !important;
        }
        video::-webkit-media-controls-enclosure {
            overflow:hidden !important;
        }
        video::-webkit-media-controls-panel {
            width: calc(100% + 30px) !important; /* إزاحة زرار الثلاث نقط برة الشاشة تماماً */
        }
    </style>
</head>

<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

<header>أهلاً بك في منصة مُعلمي - الفيديوهات التعليمية</header>

<div class="container">

    <div class='chapter'>
        <div class='chapter-header'>
            <span>الفصل الأول: مقدمة تعليمية</span>
            <span class='arrow'>▼</span>
        </div>
        <div class='video-list'>
            
            <div class='video-item'>
                <p class='video-title' data-video='videos/lesson1.mp4'>• الدرس الأول: مقدمة عامة</p>
                <div class='video-box'></div>
            </div>

            <div class='video-item'>
                <p class='video-title' data-video='videos/lesson2.mp4'>• الدرس الثاني: الشرح الأساسي</p>
                <div class='video-box'></div>
            </div>

        </div>
    </div>

    <div class='chapter'>
        <div class='chapter-header'>
            <span>الفصل الثاني: الدروس المتقدمة</span>
            <span class='arrow'>▼</span>
        </div>
        <div class='video-list'>
            
            <div class='video-item'>
                <p class='video-title' data-video='videos/lesson3.mp4'>• الدرس الثالث: تطبيقات عملية</p>
                <div class='video-box'></div>
            </div>

        </div>
    </div>

</div>

<footer style="
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 12px 0;
    background-color: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(5px);
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    color: #64748b;
    border-top: 1px solid #e2e8f0;
    z-index: 9999;
    direction: rtl;
">
    © AHMED TAHA SEAFAN - جميع الحقوق محفوظة
</footer>

<script>
    document.onkeydown = function(e) {
        // منع F12، و Ctrl+Shift+I، و Ctrl+Shift+J، و Ctrl+U (عرض السورس كود)
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || 
            (e.ctrlKey && e.keyCode == 85) ||
            (e.ctrlKey && e.keyCode == 83)) { 
            return false;
        }
    };
</script>
<script src='js/vadios.js'></script>

</body>
</html>
